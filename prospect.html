<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opportunity Notes</title>
  <script>
    const auth = JSON.parse(sessionStorage.getItem("bdr_auth") || localStorage.getItem("bdr_auth") || "null");
    if (!auth || auth.role !== "BDR") window.location.href = "index.html";
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6fb; color: #171a22; }
    .page { max-width: 980px; margin: 0 auto; padding: 28px 24px 40px; }
    .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    h1 { font-size: 25px; line-height: 1.12; }
    .sub { margin-top: 6px; color: #687183; font-size: 13px; line-height: 1.45; }
    .btn { height: 38px; border: 0; border-radius: 8px; padding: 0 14px; font-size: 13px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: #4f67ff; color: #fff; }
    .btn-secondary { background: #eef1f7; color: #333b49; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 18px; align-items: start; }
    .panel { background: #fff; border: 1px solid #e4e9f2; border-radius: 8px; overflow: hidden; }
    .panel-head { min-height: 54px; border-bottom: 1px solid #eef1f6; padding: 14px 16px; }
    .panel-title { font-size: 14px; font-weight: 850; }
    .panel-note { color: #747d8d; font-size: 12px; margin-top: 2px; }
    .detail { padding: 16px; display: grid; gap: 12px; }
    .kv { display: grid; grid-template-columns: 104px 1fr; gap: 10px; font-size: 13px; }
    .kv label { color: #747d8d; font-weight: 850; }
    .pill { display: inline-flex; align-items: center; height: 22px; padding: 0 9px; border-radius: 999px; font-size: 11px; font-weight: 850; width: max-content; }
    .pill-blue { background: #eef2ff; color: #4f46e5; }
    .pill-green { background: #dcfce7; color: #15803d; }
    .pill-orange { background: #fff7ed; color: #c2410c; }
    .pill-red { background: #fee2e2; color: #b91c1c; }
    textarea { width: 100%; min-height: 360px; padding: 14px; border: 1px solid #dde3ee; border-radius: 8px; background: #fff; color: #171a22; font: inherit; line-height: 1.5; resize: vertical; outline: none; }
    .mom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mom-grid textarea { min-height: 300px; }
    .field label { display: block; font-size: 12px; color: #5f6675; font-weight: 850; margin-bottom: 6px; }
    textarea:focus { border-color: #4f67ff; box-shadow: 0 0 0 3px rgba(79,103,255,.12); }
    .notes-body { padding: 16px; display: grid; gap: 12px; }
    .actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .saved { color: #15803d; font-size: 12px; font-weight: 800; opacity: 0; transition: opacity .2s; }
    .saved.show { opacity: 1; }
    .empty { background: #fff; border: 1px solid #e4e9f2; border-radius: 8px; padding: 32px; color: #687183; }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .mom-grid { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page" id="page"></main>

  <script>
    const storeKey = "bdr_flow_records_v1";
    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get("id"));

    function load() {
      try { return JSON.parse(localStorage.getItem(storeKey) || "[]"); } catch (error) { return []; }
    }
    function save(items) { localStorage.setItem(storeKey, JSON.stringify(items)); }
    function esc(value) { return String(value || "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])); }
    function label(step) {
      const labels = {
        intro: "Intro Call Completed", gong: "Gong Recording Captured", ai: "AI Processing", push: "CRM + Slack Updated",
        reminder24: "24h BDR Reminder", details: "Detail Check", reconnect: "Reconnect with Opportunity",
        fill: "Fill Missing Details", demoStage: "Move to Demo Stage", schedule: "Demo Scheduled",
        aeDemo: "AE Conducts Demo", demoDone: "Demo Completed", followup24: "BDR + AE Follow-up",
        timer48: "48h AE Decision Timer", aeDecision: "AE Decision", accepted: "Opportunity Accepted",
        notifyAccept: "Acceptance Notifications", sales: "Sales Cycle", rejected: "AE Rejected",
        notifyReject: "Rejection Notifications", contest: "Contest Decision", close: "Close / Nurture",
        raise: "Contest Raised", manager: "Manager Review", contestClose: "Contest Closed",
        reassign: "Reassigned to AE", newAe: "New AE Continues", moreInfo: "More Info Requested"
      };
      return labels[step] || step;
    }
    function status(record) {
      if (["sales", "newAe"].includes(record.step)) return ["Sales", "pill-green"];
      if (["close", "contestClose"].includes(record.step)) return ["Closed", "pill-red"];
      if (["rejected", "notifyReject", "contest", "raise", "manager", "moreInfo"].includes(record.step)) return ["Review", "pill-orange"];
      return ["Active", "pill-blue"];
    }
    function render() {
      const record = load().find(item => item.id === id);
      const page = document.getElementById("page");
      if (!record) {
        page.innerHTML = `<div class="empty"><strong>Opportunity not found.</strong><div class="sub">Go back to the opportunity list and open an existing record.</div></div>`;
        return;
      }
      const [statusText, statusClass] = status(record);
      document.title = record.contact + " Notes";
      page.innerHTML = `
        <div class="top">
          <div>
            <h1>${esc(record.contact)}</h1>
            <p class="sub">${esc(record.company)} · ${esc(label(record.step))}</p>
          </div>
          <button class="btn btn-secondary" onclick="window.close()">Close Tab</button>
        </div>
        <div class="grid">
          <section class="panel">
            <div class="panel-head">
              <div class="panel-title">Opportunity Details</div>
              <div class="panel-note">Context from the BDR flow.</div>
            </div>
            <div class="detail">
              <div class="kv"><label>Status</label><span class="pill ${statusClass}">${esc(statusText)}</span></div>
              <div class="kv"><label>BDR</label><div>${esc(record.bdr)}</div></div>
              <div class="kv"><label>AE</label><div>${esc(record.ae)}</div></div>
              <div class="kv"><label>Step</label><div>${esc(label(record.step))}</div></div>
              <div class="kv"><label>Details</label><div>${record.detailsComplete ? "Complete" : "Missing"}</div></div>
              <div class="kv"><label>AI Notes</label><div>${esc(record.notes)}</div></div>
            </div>
          </section>
          <section class="panel">
            <div class="panel-head">
              <div class="panel-title">Client Discussion Notes</div>
              <div class="panel-note">Write what was discussed with the client.</div>
            </div>
            <div class="notes-body">
              <textarea id="discussionNotes" placeholder="Add discussion notes, pain points, objections, next steps, budget details, stakeholders, timeline...">${esc(record.discussionNotes || "")}</textarea>
              <div class="actions">
                <span class="saved" id="saved">Saved</span>
                <button class="btn btn-primary" onclick="saveNotes()">Save Notes</button>
              </div>
            </div>
          </section>
        </div>
        <section class="panel" style="margin-top:18px">
          <div class="panel-head">
            <div class="panel-title">Generate MoM</div>
            <div class="panel-note">Paste the call transcript, generate the MoM, then save only the MoM against this opportunity.</div>
          </div>
          <div class="notes-body">
            <div class="mom-grid">
              <div class="field">
                <label for="transcript">Call Transcript</label>
                <textarea id="transcript" placeholder="Paste the client call transcript here..."></textarea>
              </div>
              <div class="field">
                <label for="mom">Generated MoM</label>
                <textarea id="mom" placeholder="Generated MoM will appear here...">${esc(record.mom || "")}</textarea>
              </div>
            </div>
            <div class="actions">
              <span class="saved" id="momSaved">MoM saved</span>
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button class="btn btn-secondary" onclick="generateMom()">Generate MoM</button>
                <button class="btn btn-primary" onclick="saveMom()">Save MoM</button>
              </div>
            </div>
          </div>
        </section>
      `;
    }
    function unique(items) {
      return [...new Set(items.map(item => item.trim()).filter(Boolean))];
    }
    function transcriptSentences(text) {
      return text
        .replace(/\s+/g, " ")
        .split(/(?<=[.!?])\s+|\n+/)
        .map(line => line.trim())
        .filter(line => line.length > 12);
    }
    function pickLines(sentences, keywords, fallback) {
      const matches = sentences.filter(line => keywords.some(word => line.toLowerCase().includes(word))).slice(0, 5);
      return (matches.length ? unique(matches) : [fallback]).map(item => "- " + item).join("\n");
    }
    function momSection(number, title, sentences, keywords, fallback) {
      return number + ". " + title + "\n" + pickLines(sentences, keywords, fallback);
    }
    function generateMom() {
      const items = load();
      const record = items.find(item => item.id === id);
      if (!record) return;
      const transcript = document.getElementById("transcript").value.trim();
      if (!transcript) {
        document.getElementById("transcript").focus();
        return;
      }
      const sentences = transcriptSentences(transcript);
      const mom = [
        "Minutes of Meeting",
        "",
        "Opportunity: " + record.contact,
        "Company: " + record.company,
        "BDR: " + record.bdr,
        "AE mapped: " + record.ae,
        "Date: " + new Date().toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }),
        "",
        momSection(1, "Company Information", sentences, ["company", "founded", "industry", "employees", "headcount", "revenue", "customers", "market", "business"], "Company information was not clearly captured in the transcript."),
        "",
        momSection(2, "Trigger to evaluate new tools now", sentences, ["trigger", "evaluate", "looking", "now", "change", "initiative", "priority", "reason", "why now"], "Trigger to evaluate new tools needs confirmation."),
        "",
        momSection(3, "Team composition", sentences, ["team", "sdr", "bdr", "ae", "sales", "revops", "manager", "people", "reps", "headcount"], "Team composition needs confirmation."),
        "",
        momSection(4, "Existing tech stack & challenges(SDR)", sentences, ["crm", "salesforce", "hubspot", "outreach", "salesloft", "gong", "zoominfo", "stack", "tool", "challenge", "manual", "workflow"], "Existing tech stack and SDR challenges need confirmation."),
        "",
        momSection(5, "Key pain points(SDR)", sentences, ["pain", "challenge", "problem", "issue", "manual", "delay", "low", "missing", "inefficient", "follow-up", "quality"], "Key SDR pain points need confirmation."),
        "",
        momSection(6, "Key Metrics, Goals and Objectives", sentences, ["metric", "goal", "objective", "kpi", "conversion", "pipeline", "revenue", "meeting", "demo", "quota", "productivity"], "Key metrics, goals, and objectives need confirmation."),
        "",
        momSection(7, "How do you know us ?", sentences, ["heard", "know", "referral", "website", "linkedin", "event", "webinar", "search", "recommend", "partner"], "Source of awareness needs confirmation."),
        "",
        momSection(8, "Integration Tools", sentences, ["integrate", "integration", "api", "slack", "crm", "salesforce", "hubspot", "gong", "calendar", "email", "zapier"], "Required integration tools need confirmation."),
        "",
        momSection(9, "Application types & use cases", sentences, ["use case", "application", "workflow", "process", "automate", "qualification", "prospecting", "follow-up", "demo", "reporting"], "Application types and use cases need confirmation."),
        "",
        momSection(10, "Tools(competitors) being evaluated", sentences, ["competitor", "evaluate", "vendor", "tool", "alternative", "outreach", "salesloft", "apollo", "zoominfo", "clay", "lavender"], "Competing tools being evaluated need confirmation."),
        "",
        momSection(11, "Any other points you’d like to mention", sentences, ["also", "additionally", "important", "note", "concern", "mention", "anything else", "other"], "No additional points were clearly captured."),
        "",
        momSection(12, "Decision making process(SDR)", sentences, ["decision", "approve", "approval", "stakeholder", "buying", "process", "committee", "procurement", "legal", "security"], "Decision-making process needs confirmation."),
        "",
        momSection(13, "Budget allocated(SDR)", sentences, ["budget", "allocated", "cost", "price", "pricing", "spend", "investment", "commercial", "procurement"], "Budget allocation needs confirmation."),
        "",
        momSection(14, "Timeline to complete evaluation(SDR)", sentences, ["timeline", "evaluation", "complete", "deadline", "target", "next week", "month", "quarter", "date", "go-live"], "Timeline to complete evaluation needs confirmation."),
        "",
        momSection(15, "Anyone to add, other stakeholders", sentences, ["stakeholder", "add", "include", "invite", "manager", "director", "vp", "procurement", "legal", "security", "revops"], "Other stakeholders to add need confirmation."),
        "",
        momSection(16, "Evaluation criteria to select a tool", sentences, ["criteria", "select", "evaluate", "must have", "requirement", "security", "integration", "roi", "ease", "accuracy", "support"], "Evaluation criteria need confirmation.")
      ].join("\n");
      document.getElementById("mom").value = mom;
    }
    function saveMom() {
      const items = load();
      const record = items.find(item => item.id === id);
      if (!record) return;
      const mom = document.getElementById("mom").value.trim();
      if (!mom) {
        document.getElementById("mom").focus();
        return;
      }
      record.mom = mom;
      record.momUpdatedAt = new Date().toISOString();
      record.log = record.log || [];
      record.log.unshift(["MoM saved", "Generated MoM saved against this opportunity."]);
      save(items);
      const saved = document.getElementById("momSaved");
      saved.classList.add("show");
      setTimeout(() => saved.classList.remove("show"), 1400);
    }
    function saveNotes() {
      const items = load();
      const record = items.find(item => item.id === id);
      if (!record) return;
      record.discussionNotes = document.getElementById("discussionNotes").value;
      record.log = record.log || [];
      record.log.unshift(["Client discussion notes updated", "Notes saved from opportunity detail page."]);
      save(items);
      const saved = document.getElementById("saved");
      saved.classList.add("show");
      setTimeout(() => saved.classList.remove("show"), 1400);
    }
    window.saveNotes = saveNotes;
    window.generateMom = generateMom;
    window.saveMom = saveMom;
    render();
  </script>
</body>
</html>
