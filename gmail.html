<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Gmail Inbox</title>
  <script>
    const auth = JSON.parse(sessionStorage.getItem("bdr_auth") || localStorage.getItem("bdr_auth") || "null");
    if (!auth || auth.role !== "AE") window.location.href = "index.html";
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f6f8fc; color: #202124; }
    .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    aside { padding: 18px 14px; background: #fff; border-right: 1px solid #e5e7eb; }
    .brand { height: 42px; display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 800; margin-bottom: 22px; }
    .gmail-mark { width: 34px; height: 26px; border-radius: 5px; border: 3px solid #ea4335; color: #ea4335; display: grid; place-items: center; font-weight: 900; line-height: 1; }
    .compose { height: 42px; border: 0; border-radius: 8px; background: #c2e7ff; color: #001d35; font-weight: 800; padding: 0 18px; margin-bottom: 16px; cursor: pointer; }
    .folder { height: 34px; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 14px; font-size: 14px; color: #3c4043; }
    .folder.active { background: #d3e3fd; font-weight: 800; color: #001d35; }
    main { min-width: 0; padding: 18px; }
    .top { height: 54px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; margin-bottom: 14px; }
    .search { height: 38px; width: min(560px, 62vw); border: 1px solid #e5e7eb; border-radius: 8px; padding: 0 12px; background: #f1f3f4; color: #202124; font: inherit; }
    .account { color: #5f6368; font-size: 13px; }
    .content { display: grid; grid-template-columns: minmax(320px, 42%) 1fr; gap: 14px; min-height: calc(100vh - 104px); }
    .list, .reader { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .list-head { height: 44px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; font-size: 13px; font-weight: 800; }
    .mail-row { border-bottom: 1px solid #f0f1f3; padding: 12px 14px; display: grid; gap: 4px; cursor: pointer; }
    .mail-row:hover, .mail-row.active { background: #f5f8ff; }
    .mail-row.unread .subject, .mail-row.unread .from { font-weight: 900; }
    .row-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .from, .subject { font-size: 13px; }
    .date, .preview, .muted { color: #5f6368; font-size: 12px; line-height: 1.4; }
    .empty { padding: 42px 18px; text-align: center; color: #5f6368; font-size: 13px; }
    .reader { padding: 20px; display: grid; align-content: start; gap: 14px; }
    h1 { font-size: 22px; line-height: 1.2; font-weight: 700; }
    .body { white-space: pre-line; color: #303134; font-size: 14px; line-height: 1.6; border-top: 1px solid #eef0f3; padding-top: 16px; }
    @media (max-width: 820px) {
      .shell { grid-template-columns: 1fr; }
      aside { display: none; }
      .content { grid-template-columns: 1fr; }
      .search { width: 100%; }
      .top { height: auto; min-height: 54px; gap: 10px; flex-direction: column; align-items: stretch; padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand"><div class="gmail-mark">M</div><span>Gmail</span></div>
      <button class="compose">Compose</button>
      <div class="folder active">Inbox <span id="folderCount"></span></div>
      <div class="folder">Starred</div>
      <div class="folder">Sent</div>
      <div class="folder">Drafts</div>
    </aside>
    <main>
      <div class="top">
        <input class="search" placeholder="Search mail" />
        <div class="account" id="account"></div>
      </div>
      <div class="content">
        <section class="list">
          <div class="list-head"><span>Inbox</span><span id="inboxCount">0</span></div>
          <div id="mailList"></div>
        </section>
        <section class="reader" id="reader">
          <div class="empty">Select an email to read.</div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const mailboxKey = "bdr_demo_mailbox_v1";
    let currentMessageId = null;

    function esc(value) { return String(value || "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])); }
    function isDue(item) { return !item.scheduledFor || new Date(item.scheduledFor).getTime() <= Date.now(); }
    function fmt(value) {
      return value ? new Date(value).toLocaleString("en-IN", { day: "2-digit", month: "short", hour: "numeric", minute: "2-digit" }) : "";
    }
    async function loadMailbox() {
      try {
        const response = await fetch("/api/mailbox", { cache: "no-store" });
        if (response.ok) return await response.json();
      } catch (error) {}
      try { return JSON.parse(localStorage.getItem(mailboxKey) || "[]"); } catch (error) { return []; }
    }
    async function saveMailbox(items) {
      localStorage.setItem(mailboxKey, JSON.stringify(items));
      try {
        await fetch("/api/mailbox", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(items)
        });
      } catch (error) {}
    }
    async function openMessage(id) {
      const allMessages = await loadMailbox();
      const message = allMessages.find(item => Number(item.id) === Number(id));
      if (!message) return;
      currentMessageId = id;
      if (!message.read) {
        message.read = true;
        await saveMailbox(allMessages);
      }
      renderMessage(message);
      await render();
    }
    function renderMessage(message) {
      document.getElementById("reader").innerHTML = `<h1>${esc(message.subject)}</h1>
        <div>
          <div class="from">${esc(message.from)}</div>
          <div class="muted">To: ${esc(message.to)} · ${esc(fmt(message.scheduledFor || message.createdAt))}</div>
        </div>
        <div class="body">${esc(message.body)}</div>`;
    }
    async function render() {
      document.getElementById("account").textContent = auth.email;
      const messages = (await loadMailbox())
        .filter(item => String(item.to || "").toLowerCase() === auth.email.toLowerCase() && isDue(item))
        .sort((a, b) => new Date(b.scheduledFor || b.createdAt) - new Date(a.scheduledFor || a.createdAt));
      const unread = messages.filter(item => !item.read).length;
      document.getElementById("inboxCount").textContent = messages.length + " messages";
      document.getElementById("folderCount").textContent = unread ? unread : "";
      document.getElementById("mailList").innerHTML = messages.length ? messages.map(item => `<div class="mail-row ${item.read ? "" : "unread"} ${Number(item.id) === Number(currentMessageId) ? "active" : ""}" onclick="openMessage(${item.id})">
        <div class="row-top"><span class="from">${esc(item.from)}</span><span class="date">${esc(fmt(item.scheduledFor || item.createdAt))}</span></div>
        <div class="subject">${esc(item.subject)}</div>
        <div class="preview">${esc(item.preview)}</div>
      </div>`).join("") : `<div class="empty">No reminder emails yet.</div>`;
    }
    window.openMessage = openMessage;
    setInterval(render, 5000);
    render();
  </script>
</body>
</html>
