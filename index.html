<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDR Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6fb; color: #171a22; display: grid; place-items: center; padding: 24px; }
    .login { width: min(420px, 100%); background: #fff; border: 1px solid #e4e9f2; border-radius: 8px; overflow: hidden; box-shadow: 0 18px 50px rgba(18, 24, 38, .12); }
    .head { padding: 22px 24px 16px; border-bottom: 1px solid #eef1f6; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; margin-bottom: 14px; }
    .logo { width: 40px; height: 40px; border-radius: 8px; background: #4f67ff; color: #fff; display: grid; place-items: center; font-size: 13px; }
    h1 { font-size: 22px; line-height: 1.15; }
    .sub { margin-top: 6px; color: #687183; font-size: 13px; line-height: 1.45; }
    form { padding: 20px 24px 24px; display: grid; gap: 14px; }
    label { display: block; font-size: 12px; color: #5f6675; font-weight: 850; margin-bottom: 6px; }
    input, select { width: 100%; height: 40px; border: 1px solid #dde3ee; border-radius: 8px; background: #fff; color: #171a22; font: inherit; padding: 0 12px; outline: none; }
    input:focus, select:focus { border-color: #4f67ff; box-shadow: 0 0 0 3px rgba(79,103,255,.12); }
    .btn { height: 40px; border: 0; border-radius: 8px; background: #4f67ff; color: #fff; font-size: 13px; font-weight: 900; cursor: pointer; margin-top: 4px; }
    .error { min-height: 18px; color: #b91c1c; font-size: 12px; font-weight: 800; }
  </style>
</head>
<body>
  <section class="login">
    <div class="head">
      <div class="brand"><div class="logo">BDR</div><span>Flow Console</span></div>
      <h1>Sign in</h1>
      <p class="sub">Choose your role and use the assigned credentials.</p>
    </div>
    <form id="loginForm">
      <div>
        <label for="role">Role</label>
        <select id="role">
          <option value="BDR">BDR</option>
          <option value="AE">AE</option>
          <option value="BDR Manager">BDR Manager</option>
          <option value="AE Manager">AE Manager</option>
        </select>
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="error" id="error"></div>
      <button class="btn" type="submit">Login</button>
    </form>
  </section>

  <script>
    const users = {
      BDR: { email: "ranjana@yopmail.com", password: "AIGrocks", redirect: "bdr.html" },
      AE: { email: "barnali@yopmail.com", password: "AIGrocks", redirect: "ae.html" },
      "BDR Manager": { email: "mithun@yopmail.com", password: "AIGrocks", redirect: "bdr-manager.html" },
      "AE Manager": { email: "piyush@yopmail.com", password: "AIGrocks", redirect: "ae-manager.html" }
    };
    document.getElementById("loginForm").addEventListener("submit", event => {
      event.preventDefault();
      const role = document.getElementById("role").value;
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const user = users[role];
      if (email !== user.email || password !== user.password) {
        document.getElementById("error").textContent = "Invalid role, email, or password.";
        return;
      }
      const auth = JSON.stringify({ role, email });
      sessionStorage.setItem("bdr_auth", auth);
      localStorage.setItem("bdr_auth", auth);
      window.location.href = user.redirect;
    });
  </script>
</body>
</html>
